<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BBA 2nd Sem: Project Core</title>

<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Manrope:wght@200;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* --- 1. UNIVERSAL RESET --- */
*{margin:0;padding:0;box-sizing:border-box;cursor:none!important;-webkit-tap-highlight-color: transparent;}

body{
    background:#030303;
    color:#e0e0e0;
    font-family:'Manrope',sans-serif;
    overflow:hidden;
    height:100vh;width:100vw;
    transition: background 0.8s ease, color 0.8s ease;
    display: flex; flex-direction: column;
}

/* --- OLD MONEY VIBE --- */
body.old-money {
    background: radial-gradient(circle at center, #1b2e25 0%, #0a110e 100%);
    color: #e8dcb5;
}
body.old-money .glass-btn, 
body.old-money .glass-nav-btn {
    border-color: #d4af37; color: #d4af37;
    background: rgba(20, 20, 10, 0.3);
}
body.old-money .glass-btn:hover, 
body.old-money .glass-nav-btn:hover {
    background: #d4af37; color: #000;
}
body.old-money h1 { text-shadow: 0 0 40px rgba(212, 175, 55, 0.4); }
body.old-money .logo span { color: #d4af37; }

/* --- LOADER --- */
.loader-screen{
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:#000;z-index:9999;
    display:flex;flex-direction:column;
    justify-content:center;align-items:center;
}
.loader-bar-bg{width:300px;height:2px;background:rgba(255,255,255,0.1);overflow:hidden;}
.loader-bar-fill{width:0%;height:100%;background:#fff;}
.loader-text{margin-top:20px;font-size:.75rem;letter-spacing:4px;color:#777;text-transform:uppercase;}

/* --- BACKGROUND --- */
#canvas-container{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;opacity:0;}
.noise{
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:url('https://grainy-gradients.vercel.app/noise.svg');
    opacity:.05;pointer-events:none;z-index:2;
}

/* --- UI CONTAINER --- */
#ui{
    position:relative;z-index:10;width:100%;height:100%;
    padding: clamp(20px, 4vh, 40px) clamp(20px, 5vw, 60px);
    display:flex;flex-direction:column;justify-content:space-between;
    pointer-events:none;
}

/* --- HEADER --- */
header{display:flex;justify-content:space-between;align-items:center;opacity:0;pointer-events:auto;}

.header-actions { display: flex; gap: 15px; }

.glass-nav-btn{
    text-decoration:none;color:#fff;
    font-size: clamp(0.75rem, 1.5vw, 0.9rem); letter-spacing:1px;
    border:1px solid rgba(255,255,255,.2);
    padding: clamp(8px, 1.5vh, 10px) clamp(15px, 2vw, 25px);
    border-radius:50px;
    background:rgba(255,255,255,.05);transition:0.3s; cursor: pointer;
}
.glass-nav-btn:hover{background:#fff;color:#000;}

.logo-container{text-align:center;opacity:0;}
.logo{font-family:'Italiana',serif; font-size: clamp(1.2rem, 2.5vw, 1.8rem);}
.logo span{display:block;font-size:0.5em;color:#888;letter-spacing: 2px;}

.header-info{display:flex;gap:20px; font-size: clamp(0.7rem, 1.2vw, 0.9rem); color:#aaa;opacity:0;}

/* --- HERO --- */
.hero{
    position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%);
    text-align:center;width:100%;
    padding: 0 20px;
    transition: opacity 0.8s ease, transform 0.8s ease;
}

.hero.hidden {
    opacity: 0;
    transform: translate(-50%, -60%);
    pointer-events: none;
}

h1{
    font-family:'Italiana',serif;
    font-size: clamp(3rem, 8vw, 6rem);
    line-height: 1.1; color:#fff; opacity:0;
    text-shadow: 0 0 30px rgba(255,255,255,0.1);
}

.subtitle{
    margin-top:20px; opacity:0; color:#aaa;
    font-size: clamp(0.9rem, 1.5vw, 1.2rem);
    letter-spacing: 1px; line-height: 1.6;
    max-width: 700px; margin-left: auto; margin-right: auto;
}

.glass-btn{
    margin-top: clamp(30px, 5vh, 50px);
    display:inline-block; text-decoration:none; color:#fff;
    border:1px solid rgba(255,255,255,.2);
    padding: clamp(12px, 2vh, 18px) clamp(30px, 4vw, 50px);
    border-radius:100px; letter-spacing:3px;
    font-size: clamp(0.8rem, 1.2vw, 1rem);
    opacity:0; pointer-events:auto; transition: 0.3s;
    backdrop-filter: blur(10px);
}
.glass-btn:hover{background:#fff;color:#000; padding: clamp(12px, 2vh, 18px) clamp(40px, 5vw, 60px);}

.footer-info{display:flex;justify-content:space-between; font-size: clamp(0.6rem, 1vw, 0.8rem); color:#555;opacity:0;}

/* --- MOBILE --- */
@media (max-width: 768px){
    header{flex-direction:column;gap:15px;}
    .header-info{display:flex;}
    .header-actions{width: 100%; justify-content: center;}
    h1{font-size: clamp(2.5rem, 10vw, 4rem);}
    #ui{padding: 20px;}
}
</style>
</head>

<body>

<div class="loader-screen">
    <div class="loader-bar-bg"><div class="loader-bar-fill"></div></div>
    <div class="loader-text">Loading Core...</div>
</div>

<div class="noise"></div>
<div id="canvas-container"></div>

<div id="ui">
<header>
    <div class="header-actions">
        <a href="team_members.html" class="glass-nav-btn">Team Members</a>
        <button id="vibe-btn" class="glass-nav-btn"><i class="fas fa-gem"></i> Change Vibe</button>
    </div>

    <div class="logo-container">
        <div class="logo">BBA // 2ND SEM</div>
        <span>PROJECT PRESENTATION</span>
    </div>

    <div class="header-info">
        <div id="clock-display">00:00</div>
        <div><i class="fas fa-map-marker-alt"></i> Raipur</div>
        <div><i class="fas fa-temperature-low"></i> <span id="temp-display">--°C</span></div>
    </div>
</header>

<div class="hero">
    <h1>BBA 2nd Semester<br>Project.</h1>
    <p class="subtitle">
        A next-generation <strong>web-based presentation</strong>. 
        It uses images, text, and scroll animations to explain the topic interactively.
    </p>
    <a href="dashboard.html" class="glass-btn">ENTER SYSTEM</a>
</div>

<div class="footer-info">
    <span>Interactive Web Experience</span>
    <span>2026 Edition</span>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script>
/* LOADER */
const tl=gsap.timeline();
tl.to('.loader-bar-fill',{width:'100%',duration:2,ease:'power2.inOut'})
  .to('.loader-screen',{y:'-100%',duration:1,ease:'expo.inOut'})
  .to('#canvas-container',{opacity:1,duration:1},'-=0.5')
  .to('header',{opacity:1,duration:1},'-=0.8')
  .to('.logo-container',{opacity:1,duration:1},'-=0.8')
  .to('.header-info',{opacity:1,duration:1},'-=0.8')
  .to('h1',{opacity:1,duration:1},'-=0.6')
  .to('.subtitle',{opacity:1,duration:1},'-=0.6')
  .to('.glass-btn',{opacity:1,duration:1},'-=0.6')
  .to('.footer-info',{opacity:1,duration:1},'-=0.8');

/* CLOCK & TEMP */
function updateSystem(){
 const now=new Date();
 let h=now.getHours();
 const m=String(now.getMinutes()).padStart(2,'0');
 const ampm = h >= 12 ? 'PM' : 'AM';
 const dh = h % 12 || 12;
 document.getElementById('clock-display').innerText=`${dh}:${m} ${ampm}`;
 let temp="25";
 if(h>=12&&h<=16)temp="28"; else if(h<12)temp="26";
 document.getElementById('temp-display').innerText=`${temp}°C`;
}
setInterval(updateSystem,1000);updateSystem();

/* =========================================
   THREE.JS COSMIC MORPHING SYSTEM
   ========================================= */
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x030303, 0.002);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 4.5;

const renderer = new THREE.WebGLRenderer({alpha:true, antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

// --- CONFIG ---
const PARTICLE_COUNT = 6000;
const spherePositions = new Float32Array(PARTICLE_COUNT * 3);
const textPositions = new Float32Array(PARTICLE_COUNT * 3);
const galaxyPositions = new Float32Array(PARTICLE_COUNT * 3);
// Color arrays for morphing
const baseColors = new Float32Array(PARTICLE_COUNT * 3);
const galaxyColors = new Float32Array(PARTICLE_COUNT * 3);

// --- Initialize Base Colors (White) ---
for(let i=0; i<PARTICLE_COUNT*3; i++) baseColors[i] = 1.0;

// --- 1. SPHERE POSITIONS (Brain) ---
for(let i=0; i<PARTICLE_COUNT; i++) {
    const i3 = i * 3;
    const r = 1.6;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    spherePositions[i3] = r * Math.sin(phi) * Math.cos(theta);
    spherePositions[i3+1] = r * Math.sin(phi) * Math.sin(theta);
    spherePositions[i3+2] = r * Math.cos(phi);
}

// --- 2. TEXT POSITIONS (Compact) ---
function createTextPositions(textStr) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 600; 
    canvas.height = 150;
    
    ctx.font = '900 80px "Manrope", sans-serif'; 
    ctx.fillStyle = 'white';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(textStr, canvas.width/2, canvas.height/2);
    
    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
    const textCoords = [];
    
    for(let y=0; y<canvas.height; y+=2) { 
        for(let x=0; x<canvas.width; x+=2) {
            const index = (y * canvas.width + x) * 4;
            if(imgData[index + 3] > 128) { 
                // Reduced multiplier for compact fit (0.007)
                const posX = (x - canvas.width/2) * 0.007; 
                const posY = -(y - canvas.height/2) * 0.007; 
                const posZ = 0; 
                textCoords.push(posX, posY, posZ);
            }
        }
    }
    return textCoords;
}

const textPositionsRaw = createTextPositions("BBA 2ND SEM");
for(let i=0; i<PARTICLE_COUNT; i++) {
    const i3 = i * 3;
    const textIdx = (i % textPositionsRaw.length) * 3; 
    textPositions[i3] = textPositionsRaw[textIdx];
    textPositions[i3+1] = textPositionsRaw[textIdx+1];
    textPositions[i3+2] = textPositionsRaw[textIdx+2];
}

// --- 3. GALAXY POSITIONS & COLORS (Detailed Spiral) ---
const colorObj = new THREE.Color();
const arms = 5; // Number of spiral arms
const armWidth = 0.5; // Width of arms

for(let i=0; i<PARTICLE_COUNT; i++) {
    const i3 = i * 3;
    
    // Distribute particles: mostly near center, some in arms
    // Use a power law for radius to cluster near center
    const r = Math.random();
    const radius = 4 * Math.pow(r, 2) + 0.2; // 0.2 to 4.2 radius
    
    // Determine angle based on spiral equation
    // logarithmic spiral: angle = a + b * ln(radius)
    // simplistic spiral: angle = radius * twistFactor + armOffset
    
    const armIndex = i % arms;
    const armOffset = (Math.PI * 2 / arms) * armIndex;
    const twist = 3.0; // How much it winds
    
    // Add random spread to the angle for arm width
    const angleSpread = (Math.random() - 0.5) * armWidth / radius; // spread decreases as radius increases
    const angle = armOffset + (radius * twist) + angleSpread;
    
    galaxyPositions[i3] = Math.cos(angle) * radius; // X
    galaxyPositions[i3+1] = (Math.random() - 0.5) * 0.3 * (1 - r*0.5); // Y (Flat disc, thins out)
    galaxyPositions[i3+2] = Math.sin(angle) * radius; // Z

    // Realistic Galaxy Colors based on radius and randomness
    // Center: Bright Yellow/White
    // Mid: Orange/Red/Pink (Nebula)
    // Outer: Blue/Purple (Young stars)
    
    const distRatio = radius / 4.2; // 0 to 1 approx
    
    if (distRatio < 0.2) {
        // Core: Yellow/White/Orange
        colorObj.setHSL(0.1 + Math.random()*0.05, 0.9, 0.7 + Math.random()*0.3);
    } else if (distRatio < 0.5) {
        // Inner Arms: Red/Orange/Pink
        colorObj.setHSL(0.0 + Math.random()*0.1, 0.8, 0.5 + Math.random()*0.2); 
    } else {
        // Outer Arms: Blue/Purple/Cyan
        // Mix of blues and some pinks
        if (Math.random() > 0.3) {
             colorObj.setHSL(0.6 + Math.random()*0.1, 0.8, 0.5 + Math.random()*0.3); // Blue
        } else {
             colorObj.setHSL(0.8 + Math.random()*0.1, 0.8, 0.5 + Math.random()*0.3); // Purple/Pink
        }
    }
    
    galaxyColors[i3] = colorObj.r;
    galaxyColors[i3+1] = colorObj.g;
    galaxyColors[i3+2] = colorObj.b;
}

// --- GEOMETRY SETUP ---
const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(spherePositions), 3));
// Add Color Attribute
geometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(baseColors), 3));

const material = new THREE.PointsMaterial({
    size: 0.012, 
    vertexColors: true, // IMPORTANT: Enable vertex colors
    transparent: true, 
    opacity: 0.9,
    sizeAttenuation: true,
    blending: THREE.AdditiveBlending, // Glow effect
    depthWrite: false
});
const particles = new THREE.Points(geometry, material);
scene.add(particles);

// --- ANIMATION VARIABLES ---
const morphObj = { val: 0 }; 
let isRotating = true; // Control Sphere Rotation
let isGalaxySpin = false; // Control Galaxy Rotation

// --- UNIVERSAL MORPH FUNCTION ---
let bufferStartPos = spherePositions;
let bufferEndPos = textPositions;
let bufferStartCol = baseColors;
let bufferEndCol = baseColors;

function updateGeometry() {
    const posAttr = particles.geometry.attributes.position.array;
    const colAttr = particles.geometry.attributes.color.array;
    
    for(let i=0; i<PARTICLE_COUNT; i++) {
        const i3 = i * 3;
        // Lerp Positions
        posAttr[i3]   = bufferStartPos[i3]   + (bufferEndPos[i3]   - bufferStartPos[i3])   * morphObj.val;
        posAttr[i3+1] = bufferStartPos[i3+1] + (bufferEndPos[i3+1] - bufferStartPos[i3+1]) * morphObj.val;
        posAttr[i3+2] = bufferStartPos[i3+2] + (bufferEndPos[i3+2] - bufferStartPos[i3+2]) * morphObj.val;
        
        // Lerp Colors
        colAttr[i3]   = bufferStartCol[i3]   + (bufferEndCol[i3]   - bufferStartCol[i3])   * morphObj.val;
        colAttr[i3+1] = bufferStartCol[i3+1] + (bufferEndCol[i3+1] - bufferStartCol[i3+1]) * morphObj.val;
        colAttr[i3+2] = bufferStartCol[i3+2] + (bufferEndCol[i3+2] - bufferStartCol[i3+2]) * morphObj.val;
    }
    particles.geometry.attributes.position.needsUpdate = true;
    particles.geometry.attributes.color.needsUpdate = true;
}

// --- MAIN COSMIC CYCLE ---
function startCosmicCycle() {
    const hero = document.querySelector('.hero');
    // 10s Delay after returning to Sphere
    const tl = gsap.timeline({repeat: -1, repeatDelay: 10}); 
    
    // 1. SPHERE -> TEXT
    tl.call(() => { 
        bufferStartPos = spherePositions; bufferEndPos = textPositions; 
        bufferStartCol = baseColors; bufferEndCol = baseColors; // Keep white for text
        morphObj.val = 0; 
    })
    .to(hero, { opacity: 0, y: -20, duration: 0.8, ease: "power2.in" }) // Hide UI
    .to(particles.rotation, { x: 0, y: 0, z: 0, duration: 1 }) // Stop Sphere Spin
    .to(morphObj, {
        val: 1, 
        duration: 2, 
        ease: "power2.inOut",
        onUpdate: updateGeometry,
        onStart: () => { isRotating = false; } // Lock Rotation
    })
    
    // 2. WAIT (READ TEXT)
    .to({}, {duration: 4})
    
    // 3. TEXT -> BIG BANG (Explosion)
    .to(particles.scale, { x: 8, y: 8, z: 8, duration: 0.3, ease: "expo.out" }) // FLASH EXPANSION
    .to(material, { opacity: 0, duration: 0.1 }, "<0.1")
    
    // 4. BIG BANG -> GALAXY (Real Colors)
    .call(() => { 
        bufferStartPos = textPositions; bufferEndPos = galaxyPositions; 
        bufferStartCol = baseColors; bufferEndCol = galaxyColors; // Morph to Galaxy Colors
        morphObj.val = 1; // Instant swap logic
        particles.scale.set(0.1, 0.1, 0.1); // Reset scale small
        isGalaxySpin = true; // Enable Galaxy Spin
        // Set proper Galaxy angle (Tilted face-on view like image)
        particles.rotation.x = Math.PI * 0.3; 
        particles.rotation.y = 0;
        particles.rotation.z = Math.PI * 0.1;
    })
    .to(morphObj, { val: 1, duration: 0.01, onUpdate: updateGeometry }) // Swap Shape
    
    // Reveal Galaxy (Grow & Spin)
    .to(material, { opacity: 1, size: 0.015, duration: 1 }) 
    .to(particles.scale, { x: 1, y: 1, z: 1, duration: 2, ease: "power2.out" }, "<")
    
    // 5. GALAXY SPIN (Hold for 3 seconds)
    // Rotate around Y axis (which is now tilted relative to camera due to container rotation)
    // Actually simpler to rotate the particles object Z axis for spiral spin if tilted
    // Let's rely on the animate loop for spin, just wait here
    .to({}, {duration: 3})
    
    // 6. GALAXY -> GLASSY SPHERE (Blast Implosion)
    .call(() => { 
        isGalaxySpin = false; 
        bufferStartPos = galaxyPositions; bufferEndPos = spherePositions; 
        bufferStartCol = galaxyColors; bufferEndCol = baseColors; // Back to white
        morphObj.val = 0; 
    })
    .to(particles.rotation, { x: 0, y: 0, z: 0, duration: 0.5 }) // Quick reset angle
    
    // IMPLOSION (Fast Snap)
    .to(morphObj, { 
        val: 1, 
        duration: 1.5, 
        ease: "power4.inOut", 
        onUpdate: updateGeometry 
    })
    // Glassy Flash Effect
    .to(material, { opacity: 0.6, size: 0.02, duration: 0.5 }, "<") // Flash
    .to(material, { opacity: 0.9, size: 0.012, duration: 1 }, ">0.5") // Normal
    
    // 7. SHOW UI & RESUME SPHERE (Immediate)
    .call(() => { isRotating = true; }) 
    .to(hero, { opacity: 1, y: 0, duration: 1, ease: "power2.out" });
}
setTimeout(startCosmicCycle, 3000); 

// --- RENDER LOOP ---
function animate(){
    const t = Date.now() * 0.001;
    
    // Sphere Idle Rotation
    if(isRotating) {
        particles.rotation.y += 0.002;
        // Pulse
        const s = 1 + Math.sin(t) * 0.02;
        particles.scale.set(s,s,s);
    } 
    
    // Galaxy Fast Spin
    if(isGalaxySpin) {
        // Spin around the center (Z axis local because we tilted X)
        // OR simply rotate Y if not tilted. 
        // Since we set rotation.x = 0.3 in timeline, Y rotation will look like a tilted spin
        particles.rotation.y -= 0.005; 
        // particles.rotation.z -= 0.002; // Add slight tumble
    }
    
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize', ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    if(innerWidth > innerHeight) {
        gsap.to(camera.position, {z: 3.5, duration: 1});
    } else {
        gsap.to(camera.position, {z: 5.5, duration: 1}); 
    }
});

/* VIBE CHANGER */
const vibeBtn = document.getElementById('vibe-btn');
let isOldMoney = false;
vibeBtn.addEventListener('click', () => {
    isOldMoney = !isOldMoney;
    document.body.classList.toggle('old-money');
    if(isOldMoney) {
        material.vertexColors = false; // Disable vertex colors for gold override
        material.color.setHex(0xd4af37); 
        scene.fog.color.setHex(0x1b2e25);
        vibeBtn.innerHTML = '<i class="fas fa-undo"></i> Reset Vibe';
    } else {
        material.vertexColors = true; // Enable galaxy colors
        material.color.setHex(0xffffff);
        scene.fog.color.setHex(0x030303);
        vibeBtn.innerHTML = '<i class="fas fa-gem"></i> Change Vibe';
    }
});
</script>

</body>
</html>
