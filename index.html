<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BBA 2nd Sem: Project Core</title>

<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Manrope:wght@200;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* --- 1. UNIVERSAL RESET --- */
*{margin:0;padding:0;box-sizing:border-box;cursor:none!important;-webkit-tap-highlight-color: transparent;}

body{
    background:#030303;
    color:#e0e0e0;
    font-family:'Manrope',sans-serif;
    overflow:hidden;
    height:100vh;width:100vw;
    transition: background 0.8s ease, color 0.8s ease;
    display: flex; flex-direction: column;
}

/* --- OLD MONEY VIBE --- */
body.old-money {
    background: radial-gradient(circle at center, #1b2e25 0%, #0a110e 100%);
    color: #e8dcb5;
}
body.old-money .glass-btn, 
body.old-money .glass-nav-btn {
    border-color: #d4af37; color: #d4af37;
    background: rgba(20, 20, 10, 0.3);
}
body.old-money .glass-btn:hover, 
body.old-money .glass-nav-btn:hover {
    background: #d4af37; color: #000;
}
body.old-money h1 { text-shadow: 0 0 40px rgba(212, 175, 55, 0.4); }
body.old-money .logo span { color: #d4af37; }

/* --- LOADER --- */
.loader-screen{
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:#000;z-index:9999;
    display:flex;flex-direction:column;
    justify-content:center;align-items:center;
}
.loader-bar-bg{width:300px;height:2px;background:rgba(255,255,255,0.1);overflow:hidden;}
.loader-bar-fill{width:0%;height:100%;background:#fff;}
.loader-text{margin-top:20px;font-size:.75rem;letter-spacing:4px;color:#777;text-transform:uppercase;}

/* --- BACKGROUND --- */
#canvas-container{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;opacity:0;}
.noise{
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:url('https://grainy-gradients.vercel.app/noise.svg');
    opacity:.05;pointer-events:none;z-index:2;
}

/* --- UI CONTAINER (Adaptive Padding) --- */
#ui{
    position:relative;z-index:10;width:100%;height:100%;
    padding: clamp(20px, 4vh, 40px) clamp(20px, 5vw, 60px);
    display:flex;flex-direction:column;justify-content:space-between;
    pointer-events:none;
}

/* --- HEADER --- */
header{display:flex;justify-content:space-between;align-items:center;opacity:0;pointer-events:auto;}

.header-actions { display: flex; gap: 15px; }

.glass-nav-btn{
    text-decoration:none;color:#fff;
    font-size: clamp(0.75rem, 1.5vw, 0.9rem); letter-spacing:1px;
    border:1px solid rgba(255,255,255,.2);
    padding: clamp(8px, 1.5vh, 10px) clamp(15px, 2vw, 25px);
    border-radius:50px;
    background:rgba(255,255,255,.05);transition:0.3s; cursor: pointer;
}
.glass-nav-btn:hover{background:#fff;color:#000;}

.logo-container{text-align:center;opacity:0;}
.logo{font-family:'Italiana',serif; font-size: clamp(1.2rem, 2.5vw, 1.8rem);}
.logo span{display:block;font-size:0.5em;color:#888;letter-spacing: 2px;}

.header-info{display:flex;gap:20px; font-size: clamp(0.7rem, 1.2vw, 0.9rem); color:#aaa;opacity:0;}

/* --- HERO (Adaptive Text) --- */
.hero{
    position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%);
    text-align:center;width:100%;
    padding: 0 20px;
}

h1{
    font-family:'Italiana',serif;
    font-size: clamp(3rem, 8vw, 6rem); /* Responsive Font Size */
    line-height: 1.1;
    color:#fff;
    opacity:0;
    text-shadow: 0 0 30px rgba(255,255,255,0.1);
}

.subtitle{
    margin-top:20px; opacity:0; color:#aaa;
    font-size: clamp(0.9rem, 1.5vw, 1.2rem);
    letter-spacing: 1px; line-height: 1.6;
    max-width: 700px; margin-left: auto; margin-right: auto;
}

.glass-btn{
    margin-top: clamp(30px, 5vh, 50px);
    display:inline-block; text-decoration:none; color:#fff;
    border:1px solid rgba(255,255,255,.2);
    padding: clamp(12px, 2vh, 18px) clamp(30px, 4vw, 50px);
    border-radius:100px; letter-spacing:3px;
    font-size: clamp(0.8rem, 1.2vw, 1rem);
    opacity:0; pointer-events:auto; transition: 0.3s;
    backdrop-filter: blur(10px);
}
.glass-btn:hover{background:#fff;color:#000; padding: clamp(12px, 2vh, 18px) clamp(40px, 5vw, 60px);}

.footer-info{display:flex;justify-content:space-between; font-size: clamp(0.6rem, 1vw, 0.8rem); color:#555;opacity:0;}

/* --- MOBILE & PROJECTOR OPTIMIZATION --- */
@media (max-width: 768px){
    header{flex-direction:column;gap:15px;}
    .header-info{display:flex;}
    .header-actions{width: 100%; justify-content: center;}
    h1{font-size: clamp(2.5rem, 10vw, 4rem);}
    #ui{padding: 20px;}
}

/* Landscape Mode (Mobile) */
@media (max-height: 500px) and (orientation: landscape) {
    h1 { font-size: 2.5rem; margin-bottom: 5px; }
    .subtitle { margin-top: 5px; font-size: 0.8rem; }
    .glass-btn { margin-top: 15px; padding: 8px 30px; }
    header { margin-bottom: 0; }
    .logo-container { display: none; } /* Hide Logo to save space */
}
</style>
</head>

<body>

<div class="loader-screen">
    <div class="loader-bar-bg"><div class="loader-bar-fill"></div></div>
    <div class="loader-text">Initializing Core...</div>
</div>

<div class="noise"></div>
<div id="canvas-container"></div>

<div id="ui">
<header>
    <div class="header-actions">
        <a href="team_members.html" class="glass-nav-btn">Team Members</a>
        <button id="vibe-btn" class="glass-nav-btn"><i class="fas fa-gem"></i> Change Vibe</button>
    </div>

    <div class="logo-container">
        <div class="logo">BBA // 2ND SEM</div>
        <span>PROJECT PRESENTATION</span>
    </div>

    <div class="header-info">
        <div id="clock-display">00:00</div>
        <div><i class="fas fa-map-marker-alt"></i> Raipur</div>
        <div><i class="fas fa-temperature-low"></i> <span id="temp-display">--°C</span></div>
    </div>
</header>

<div class="hero">
    <h1>BBA 2nd Semester<br>Project.</h1>
    <p class="subtitle">
        A next-generation <strong>web-based presentation</strong>. 
        It uses images, text, and scroll animations to explain the topic interactively.
    </p>
    <a href="dashboard.html" class="glass-btn">ENTER SYSTEM</a>
</div>

<div class="footer-info">
    <span>Interactive Web Experience</span>
    <span>2026 Edition</span>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script>
/* LOADER ANIMATION */
const tl=gsap.timeline();
tl.to('.loader-bar-fill',{width:'100%',duration:2,ease:'power2.inOut'})
  .to('.loader-screen',{y:'-100%',duration:1,ease:'expo.inOut'})
  .to('#canvas-container',{opacity:1,duration:1},'-=0.5')
  .to('header',{opacity:1,duration:1},'-=0.8')
  .to('.logo-container',{opacity:1,duration:1},'-=0.8')
  .to('.header-info',{opacity:1,duration:1},'-=0.8')
  .to('h1',{opacity:1,duration:1},'-=0.6')
  .to('.subtitle',{opacity:1,duration:1},'-=0.6')
  .to('.glass-btn',{opacity:1,duration:1},'-=0.6')
  .to('.footer-info',{opacity:1,duration:1},'-=0.8');

/* CLOCK & TEMP LOGIC */
function updateSystem(){
 const now=new Date();
 let h=now.getHours();
 const m=String(now.getMinutes()).padStart(2,'0');
 const ampm = h >= 12 ? 'PM' : 'AM';
 const dh = h % 12 || 12;
 document.getElementById('clock-display').innerText=`${dh}:${m} ${ampm}`;

 let temp="25";
 if(h>=12&&h<=16)temp="28";
 else if(h===17)temp="25";
 else if(h===18)temp="22";
 else if(h>=19&&h<=20)temp="21";
 else if(h>=21)temp="19";
 else if(h<12)temp="26";
 document.getElementById('temp-display').innerText=`${temp}°C`;
}
setInterval(updateSystem,1000);updateSystem();

/* THREE.JS SPHERE */
const container=document.getElementById('canvas-container');
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x030303,0.002);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.z=4.5;

const renderer=new THREE.WebGLRenderer({alpha:true,antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Limit pixel ratio for performance
container.appendChild(renderer.domElement);

const geo=new THREE.BufferGeometry();
const count=3000; // Optimized count for mobile
const arr=new Float32Array(count*3);
for(let i=0;i<count;i++){
    const i3=i*3;
    const r=1.6;
    const theta=Math.random()*Math.PI*2;
    const phi=Math.acos(2*Math.random()-1);
    
    let x=r*Math.sin(phi)*Math.cos(theta);
    let y=r*Math.sin(phi)*Math.sin(theta);
    let z=r*Math.cos(phi);
    
    x+=(Math.random()-0.5)*0.2;
    y+=(Math.random()-0.5)*0.2;
    z+=(Math.random()-0.5)*0.2;
    
    arr[i3]=x; arr[i3+1]=y; arr[i3+2]=z;
}
geo.setAttribute('position',new THREE.BufferAttribute(arr,3));
const mat=new THREE.PointsMaterial({size:.009,color:0xffffff,transparent:true,opacity:0.8});
const brain=new THREE.Points(geo,mat);
scene.add(brain);

const geoWire=new THREE.IcosahedronGeometry(1.6,1);
const matWire=new THREE.MeshBasicMaterial({color:0x444444,wireframe:true,transparent:true,opacity:0.05});
const wire=new THREE.Mesh(geoWire,matWire);
scene.add(wire);

/* --- SCROLL INTERACTION --- */
let scrollVelocity = 0;
window.addEventListener('wheel', (e) => {
    scrollVelocity += e.deltaY * 0.0005;
});

function animate(){
    const t=Date.now()*0.001;
    
    // Rotation + Scroll Velocity
    brain.rotation.y += 0.002 + scrollVelocity;
    wire.rotation.y += 0.002 + scrollVelocity;
    
    // Friction (Slow down)
    scrollVelocity *= 0.95;

    const s=1+Math.sin(t)*0.02 + (Math.abs(scrollVelocity) * 0.1);
    brain.scale.set(s,s,s);
    
    renderer.render(scene,camera);
    requestAnimationFrame(animate);
}
animate();

/* --- UNIVERSAL RESIZE & LANDSCAPE ZOOM --- */
function handleResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);

    // If Landscape (Desktop/TV/Landscape Phone) -> Zoom In
    if(window.innerWidth > window.innerHeight) {
        gsap.to(camera.position, {z: 2.8, duration: 1});
    } else {
        // If Portrait (Phone Vertical) -> Zoom Out
        gsap.to(camera.position, {z: 5, duration: 1});
    }
}
window.addEventListener('resize', handleResize);
handleResize(); // Run once on load

/* --- VIBE CHANGER --- */
const vibeBtn = document.getElementById('vibe-btn');
let isOldMoney = false;

vibeBtn.addEventListener('click', () => {
    isOldMoney = !isOldMoney;
    document.body.classList.toggle('old-money');
    
    if(isOldMoney) {
        mat.color.setHex(0xd4af37); 
        matWire.color.setHex(0xd4af37);
        scene.fog.color.setHex(0x1b2e25);
        vibeBtn.innerHTML = '<i class="fas fa-undo"></i> Reset Vibe';
    } else {
        mat.color.setHex(0xffffff);
        matWire.color.setHex(0x444444);
        scene.fog.color.setHex(0x030303);
        vibeBtn.innerHTML = '<i class="fas fa-gem"></i> Change Vibe';
    }
});
</script>

</body>
</html>
