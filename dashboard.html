<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Presentation Mode: BBA OS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Manrope:wght@200;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- 1. UNIVERSAL RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: #000; /* Pure Black for Projectors */
            color: #e0e0e0;
            font-family: 'Manrope', sans-serif;
            overflow: hidden;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
        }

        /* --- 2. TEXTURE & CURSOR --- */
        .noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05; pointer-events: none; z-index: 2;
        }

        #cursor-big {
            position: fixed; width: 40px; height: 40px;
            border: 1px solid rgba(255,255,255,0.3); border-radius: 50%;
            pointer-events: none; z-index: 9999; transform: translate(-50%, -50%);
            transition: transform 0.15s ease-out; mix-blend-mode: difference;
        }
        #cursor-small {
            position: fixed; width: 6px; height: 6px; background: white;
            border-radius: 50%; pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%);
        }

        /* Hide cursor on Touch Devices */
        @media (hover: none) { 
            #cursor-big, #cursor-small { display: none; } 
            * { cursor: default !important; }
        }

        /* --- 3. START SCREEN --- */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1558494949-ef526b0042a0?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center;
            z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .start-content { text-align: center; z-index: 10; width: 90%; }
        
        .tag {
            font-size: clamp(0.8rem, 2vw, 1rem); letter-spacing: 4px; text-transform: uppercase;
            color: #00f3ff; margin-bottom: 20px; display: block; font-weight: 600;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        h1.main-title {
            font-family: 'Italiana', serif; 
            font-size: clamp(2.5rem, 6vw, 5rem); /* Responsive Text */
            line-height: 1.1; color: #fff; margin-bottom: 40px; font-weight: 400;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .glass-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            padding: clamp(15px, 2vh, 20px) clamp(40px, 5vw, 60px);
            border-radius: 100px;
            color: #fff; font-family: 'Manrope', sans-serif;
            font-size: clamp(0.9rem, 1.5vw, 1.1rem); letter-spacing: 3px; text-transform: uppercase;
            cursor: pointer; backdrop-filter: blur(15px);
            transition: 0.4s; position: relative; overflow: hidden;
        }
        .glass-btn:hover { background: #fff; color: #000; padding: clamp(15px, 2vh, 20px) clamp(50px, 6vw, 80px); }

        /* --- 4. MAIN INTERFACE --- */
        #main-interface {
            opacity: 0; pointer-events: none; width: 100%; height: 100%; position: relative;
            transition: opacity 1s;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
        }

        /* Header */
        .ppt-header {
            position: absolute; top: 0; left: 0; width: 100%;
            padding: clamp(15px, 3vh, 30px) clamp(20px, 4vw, 50px);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }

        .nav-link {
            text-decoration: none; color: #fff; opacity: 0.7; 
            font-size: clamp(0.8rem, 1.5vw, 1rem);
            display: flex; align-items: center; gap: 10px; transition: 0.3s;
        }
        .nav-link:hover { opacity: 1; letter-spacing: 1px; color: #00f3ff; }

        .slide-counter {
            font-family: 'Italiana', serif; 
            font-size: clamp(1.2rem, 2.5vw, 1.5rem); color: #fff;
        }
        .slide-counter span { font-size: 0.8em; color: #666; font-family: 'Manrope'; margin-left: 5px; }

        /* Slider - Universal Fit */
        .slider-container {
            display: flex; width: 100%; height: 100%;
            overflow: hidden; /* Scroll handled by JS */
        }

        .slide {
            min-width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: transparent; position: relative;
            padding: 0;
        }

        .slide img {
            /* Ensures image fits perfectly on ANY screen (Mobile/TV/Projector) */
            width: 100%; height: 100%;
            object-fit: contain; 
            max-width: 100%; max-height: 100%;
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.9));
            transition: transform 0.1s ease-out;
        }

        /* --- 5. CONTROL BAR (Compact) --- */
        .control-bar {
            position: fixed; bottom: clamp(20px, 5vh, 40px); left: 50%; transform: translateX(-50%);
            padding: 10px 25px;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 100px;
            display: flex; align-items: center; gap: clamp(20px, 3vw, 30px);
            z-index: 100; opacity: 0; transform: translate(-50%, 20px);
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            width: auto; max-width: 90%;
        }

        .ui-active .control-bar { opacity: 1; transform: translate(-50%, 0); }

        .icon-btn {
            background: transparent; border: none; color: #fff;
            font-size: clamp(1rem, 2vw, 1.2rem); cursor: pointer; opacity: 0.6;
            transition: 0.3s; padding: 5px;
        }
        .icon-btn:hover { opacity: 1; transform: scale(1.1); color: #00f3ff; }
        
        .play-btn {
            width: clamp(40px, 5vw, 50px); height: clamp(40px, 5vw, 50px);
            border-radius: 50%; border: 1px solid rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            opacity: 1;
        }
        .play-btn:hover { background: #fff; color: #000; }

        .progress-line-container {
            width: clamp(100px, 20vw, 200px); height: 2px; background: rgba(255,255,255,0.1);
            position: relative; overflow: hidden;
        }
        .progress-fill {
            position: absolute; left: 0; top: 0; height: 100%; width: 0%;
            background: #fff; transition: width 0.3s ease;
        }

        /* Landscape Mobile Fix */
        @media (max-height: 500px) and (orientation: landscape) {
            .ppt-header { padding: 10px 30px; }
            .control-bar { bottom: 15px; padding: 5px 20px; }
            h1.main-title { font-size: 2.5rem; margin-bottom: 15px; }
            .glass-btn { padding: 10px 30px; }
        }

    </style>
</head>
<body>

    <div class="noise"></div>

    <div id="cursor-big"></div>
    <div id="cursor-small"></div>

    <div id="start-screen">
        <div class="start-content">
            <span class="tag">BBA 2nd Semester Project</span>
            <h1 class="main-title">Functions & Services<br>of Operating System</h1>
            <button class="glass-btn" id="startBtn">Enter Presentation</button>
        </div>
    </div>

    <div id="main-interface">
        
        <header class="ppt-header">
            <a href="index.html" class="nav-link"><i class="fas fa-long-arrow-alt-left"></i> Dashboard</a>
            <div class="slide-counter" id="counter">01 <span>/ 11</span></div>
            <button class="icon-btn" id="fullscreenBtn"><i class="fas fa-expand"></i></button>
        </header>

        <div class="slider-container" id="slider">
            <div class="slide"><img src="3890ffdb-056c-4266-8c7d-dacf4f582c85_page_2.png"></div>
            <div class="slide"><img src="3890ffdb-056c-4266-8c7d-dacf4f582c85_page_3.png"></div>
            <div class="slide"><img src="3890ffdb-056c-4266-8c7d-dacf4f582c85_page_4.png"></div>
            <div class="slide"><img src="3890ffdb-056c-4266-8c7d-dacf4f582c85_page_5.png"></div>
            <div class="slide"><img src="3890ffdb-056c-4266-8c7d-dacf4f582c85_page_6.png"></div>
            <div class="slide"><img src="3890ffdb-056c-4266-8c7d-dacf4f582c85_page_7.png"></div>
            <div class="slide"><img src="3890ffdb-056c-4266-8c7d-dacf4f582c85_page_8.png"></div>
            <div class="slide"><img src="3890ffdb-056c-4266-8c7d-dacf4f582c85_page_09.png"></div>
            <div class="slide"><img src="3890ffdb-056c-4266-8c7d-dacf4f582c85_page_10.png"></div>
            <div class="slide"><img src="3890ffdb-056c-4266-8c7d-dacf4f582c85_page_11.png"></div>
            <div class="slide"><img src="3890ffdb-056c-4266-8c7d-dacf4f582c85_page_12.png"></div>
        </div>

        <div class="control-bar">
            <button class="icon-btn" id="prevBtn"><i class="fas fa-chevron-left"></i></button>
            <button class="icon-btn play-btn" id="autoPlayBtn"><i class="fas fa-play" style="margin-left:3px;"></i></button>
            <button class="icon-btn" id="nextBtn"><i class="fas fa-chevron-right"></i></button>
            <div class="progress-line-container">
                <div class="progress-fill" id="progressBar"></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // --- 1. AESTHETIC REVEAL ---
        const startBtn = document.getElementById('startBtn');
        const startScreen = document.getElementById('start-screen');
        const mainInterface = document.getElementById('main-interface');
        const body = document.body;

        gsap.to('.start-content', { opacity: 1, y: 0, duration: 1.5, ease: "power2.out", delay: 0.5 });

        startBtn.addEventListener('click', () => {
            gsap.to(startScreen, { opacity: 0, duration: 1.5, ease: "power2.inOut", onComplete: () => {
                startScreen.style.display = 'none';
                mainInterface.style.pointerEvents = 'all';
                mainInterface.style.opacity = '1';
                body.classList.add('ui-active');
                toggleFullScreen();
            }});
        });

        // --- 2. CURSOR & PARALLAX ---
        const cursorBig = document.getElementById('cursor-big');
        const cursorSmall = document.getElementById('cursor-small');
        
        // Only on Non-Touch Devices
        if (window.matchMedia("(hover: hover)").matches) {
            let mouseX = 0, mouseY = 0;
            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX; mouseY = e.clientY;
                gsap.to(cursorSmall, { x: mouseX, y: mouseY, duration: 0 });
                gsap.to(cursorBig, { x: mouseX - 20, y: mouseY - 20, duration: 0.1 });

                // Parallax Tilt for Images
                const activeSlide = document.elementFromPoint(window.innerWidth/2, window.innerHeight/2);
                if(activeSlide && activeSlide.tagName === 'IMG') {
                    const xVal = (window.innerWidth / 2 - mouseX) / 40;
                    const yVal = (window.innerHeight / 2 - mouseY) / 40;
                    gsap.to(activeSlide, { 
                        rotationY: -xVal, rotationX: yVal, transformPerspective: 1000, duration: 0.5 
                    });
                }
            });
        }

        // --- 3. SLIDER LOGIC + SCROLL WHEEL ---
        const slider = document.getElementById('slider');
        const counter = document.getElementById('counter');
        const progressBar = document.getElementById('progressBar');
        const totalSlides = 11;
        let isPlaying = false;
        let autoPlayInterval;
        let isScrollLocked = false; // Prevent rapid scroll

        function updateUI() {
            let scrollLeft = slider.scrollLeft;
            let slideWidth = window.innerWidth;
            let index = Math.round(scrollLeft / slideWidth) + 1;
            if (index < 1) index = 1; if (index > totalSlides) index = totalSlides;

            let indexStr = index < 10 ? `0${index}` : index;
            counter.innerHTML = `${indexStr} <span>/ ${totalSlides}</span>`;

            let pct = (index / totalSlides) * 100;
            progressBar.style.width = pct + "%";
        }

        slider.addEventListener('scroll', updateUI);

        function slideNext() { slider.scrollBy({ left: window.innerWidth, behavior: 'smooth' }); }
        function slidePrev() { slider.scrollBy({ left: -window.innerWidth, behavior: 'smooth' }); }

        document.getElementById('nextBtn').addEventListener('click', slideNext);
        document.getElementById('prevBtn').addEventListener('click', slidePrev);

        // *** SCROLL WHEEL EFFECT ***
        window.addEventListener('wheel', (e) => {
            if(isScrollLocked) return;
            
            if (e.deltaY > 0) {
                slideNext();
                lockScroll();
            } else if (e.deltaY < 0) {
                slidePrev();
                lockScroll();
            }
        });

        function lockScroll() {
            isScrollLocked = true;
            setTimeout(() => isScrollLocked = false, 800); // 800ms cool down
        }

        // --- 4. AUTOPLAY & CONTROLS ---
        const autoPlayBtn = document.getElementById('autoPlayBtn');
        autoPlayBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            if(isPlaying) {
                autoPlayBtn.innerHTML = '<i class="fas fa-pause"></i>';
                autoPlayBtn.style.background = '#fff';
                autoPlayBtn.style.color = '#000';
                autoPlayInterval = setInterval(() => {
                    if (slider.scrollLeft >= slider.scrollWidth - slider.clientWidth - 10) {
                        slider.scrollTo({ left: 0, behavior: 'smooth' });
                    } else {
                        slideNext();
                    }
                }, 3000);
            } else {
                autoPlayBtn.innerHTML = '<i class="fas fa-play" style="margin-left:3px;"></i>';
                autoPlayBtn.style.background = 'transparent';
                autoPlayBtn.style.color = '#fff';
                clearInterval(autoPlayInterval);
            }
        });

        // --- 5. FULLSCREEN, KEYBOARD, IDLE ---
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => console.log(e));
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }
        document.getElementById('fullscreenBtn').addEventListener('click', toggleFullScreen);

        document.addEventListener('keydown', (e) => {
            if(e.key === "ArrowRight") slideNext();
            if(e.key === "ArrowLeft") slidePrev();
            if(e.key === " ") autoPlayBtn.click();
        });

        let idleTimer;
        function resetIdleTimer() {
            body.classList.add('ui-active');
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                body.classList.remove('ui-active');
            }, 3000);
        }
        window.addEventListener('mousemove', resetIdleTimer);
        window.addEventListener('click', resetIdleTimer);
        window.addEventListener('touchstart', resetIdleTimer);
        
        updateUI();

    </script>
</body>
</html>
