<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Members - BBA Project</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Manrope:wght@200;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- 1. UNIVERSAL RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: #030303;
            color: #fff;
            font-family: 'Manrope', sans-serif;
            overflow-x: hidden; /* Only vertical scroll allowed */
            min-height: 100vh;
            transition: background 0.5s ease;
        }

        /* --- BACKGROUNDS --- */
        .noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05; pointer-events: none; z-index: 0;
        }
        
        .dynamic-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e, #000);
            z-index: -1; opacity: 0; transition: opacity 1s ease;
        }
        .dynamic-bg.active { opacity: 1; }

        .blob {
            position: absolute; border-radius: 50%;
            filter: blur(80px); opacity: 0.6;
            animation: float 10s infinite alternate;
        }
        .blob-1 { top: 10%; left: 10%; width: 300px; height: 300px; background: #4a00e0; }
        .blob-2 { bottom: 10%; right: 10%; width: 400px; height: 400px; background: #8e2de2; animation-delay: -5s; }

        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(30px, 50px); } }

        /* --- CURSOR (Hidden on Touch) --- */
        #cursor-big {
            position: fixed; width: 40px; height: 40px;
            border: 1px solid rgba(255,255,255,0.3); border-radius: 50%;
            pointer-events: none; z-index: 9999; transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, background 0.3s;
        }
        #cursor-small {
            position: fixed; width: 6px; height: 6px; background: white;
            border-radius: 50%; pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%);
        }
        @media (hover: none) { #cursor-big, #cursor-small { display: none; } * { cursor: default !important; } }

        /* --- UI CONTAINER (Adaptive Padding) --- */
        #container {
            position: relative; z-index: 10;
            padding: clamp(20px, 5vh, 40px) clamp(20px, 5vw, 60px);
            max-width: 1400px; margin: 0 auto;
        }

        /* --- HEADER --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: clamp(30px, 6vh, 60px);
        }

        .back-btn {
            text-decoration: none; color: #fff; 
            font-size: clamp(0.8rem, 1.5vw, 1rem);
            display: flex; align-items: center; gap: 10px; opacity: 0.7; transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.2); 
            padding: clamp(8px, 1.5vh, 10px) clamp(15px, 2vw, 25px); 
            border-radius: 50px;
        }
        .back-btn:hover { opacity: 1; background: #fff; color: #000; }

        .theme-btn {
            background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.2);
            padding: clamp(8px, 1.5vh, 10px) clamp(15px, 2vw, 25px); 
            border-radius: 50px; cursor: pointer; font-family: 'Manrope';
            font-size: clamp(0.8rem, 1.5vw, 1rem);
            transition: 0.3s;
        }
        .theme-btn:hover { background: #fff; color: #000; }

        /* --- TITLES --- */
        .page-title {
            font-family: 'Italiana', serif; 
            font-size: clamp(2.5rem, 6vw, 4rem); 
            text-align: center; margin-bottom: 10px; opacity: 0;
        }
        .page-subtitle {
            text-align: center; color: #888; 
            font-size: clamp(0.8rem, 1.5vw, 1rem); 
            letter-spacing: 2px; text-transform: uppercase;
            margin-bottom: clamp(40px, 8vh, 70px); opacity: 0;
        }

        /* --- TEAM GRID (Adaptive) --- */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); /* Auto-fit columns */
            gap: clamp(20px, 3vw, 40px);
            padding-bottom: 50px;
        }

        /* --- MEMBER CARD --- */
        .member-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: clamp(30px, 5vh, 40px) 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; position: relative; overflow: hidden;
        }

        .member-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.08);
            border-color: #fff;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* Icon Container */
        .icon-box {
            width: clamp(80px, 10vw, 100px); height: clamp(80px, 10vw, 100px); 
            margin: 0 auto 20px auto;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(2rem, 4vw, 2.5rem); color: #aaa;
            transition: 0.4s;
        }
        
        .member-card:hover .icon-box {
            background: #fff; color: #000; border-color: #fff; transform: scale(1.1);
        }

        /* Text */
        .member-name {
            font-family: 'Italiana', serif; 
            font-size: clamp(1.5rem, 3vw, 1.8rem); 
            margin-bottom: 5px; color: #fff;
        }
        .member-role {
            font-size: clamp(0.7rem, 1.2vw, 0.8rem); 
            color: #666; text-transform: uppercase; letter-spacing: 2px;
        }
        
        /* Landscape Mobile Fix */
        @media (max-height: 500px) and (orientation: landscape) {
            .page-title { margin-bottom: 5px; font-size: 2rem; }
            .page-subtitle { margin-bottom: 20px; }
            .team-grid { grid-template-columns: repeat(4, 1fr); gap: 10px; } /* All in one row */
            .icon-box { width: 60px; height: 60px; font-size: 1.5rem; margin-bottom: 10px; }
            .member-card { padding: 20px 10px; }
        }

    </style>
</head>
<body>

    <div id="cursor-big"></div>
    <div id="cursor-small"></div>

    <div class="noise"></div>
    
    <div class="dynamic-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div id="container">
        <header>
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Home</a>
            <button class="theme-btn" id="bg-toggle"><i class="fas fa-magic"></i> Change Vibe</button>
        </header>

        <h1 class="page-title">The Team</h1>
        <p class="page-subtitle">BBA 2nd Semester Group Members</p>

        <div class="team-grid">

            <div class="member-card">
                <div class="icon-box"><i class="fas fa-user"></i></div>
                <h2 class="member-name">Vipul Sahu</h2>
                <div class="member-role">Group Member</div>
            </div>

            <div class="member-card">
                <div class="icon-box"><i class="fas fa-user"></i></div>
                <h2 class="member-name">Nikhil Sinha</h2>
                <div class="member-role">Group Member</div>
            </div>

            <div class="member-card">
                <div class="icon-box"><i class="fas fa-user"></i></div>
                <h2 class="member-name">Aditya Ghosh</h2>
                <div class="member-role">Group Member</div>
            </div>

            <div class="member-card">
                <div class="icon-box"><i class="fas fa-user"></i></div>
                <h2 class="member-name">Anas Qureshi</h2>
                <div class="member-role">Group Member</div>
            </div>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // --- 1. ANIMATION SEQUENCE ---
        const tl = gsap.timeline();

        tl.to('.page-title', { opacity: 1, y: 0, duration: 1, ease: "power2.out" })
          .to('.page-subtitle', { opacity: 1, y: 0, duration: 1 }, "-=0.8");

        tl.to('.member-card', { 
            opacity: 1, 
            y: 0, 
            duration: 0.8, 
            stagger: 0.15, 
            ease: "back.out(1.7)" 
        }, "-=0.5");

        // --- 2. BACKGROUND TOGGLE ---
        const toggleBtn = document.getElementById('bg-toggle');
        const dynamicBg = document.querySelector('.dynamic-bg');
        let isVibeOn = false;

        toggleBtn.addEventListener('click', () => {
            isVibeOn = !isVibeOn;
            if(isVibeOn) {
                dynamicBg.classList.add('active');
                toggleBtn.innerHTML = '<i class="fas fa-undo"></i> Reset Vibe';
                toggleBtn.style.background = "#fff";
                toggleBtn.style.color = "#000";
            } else {
                dynamicBg.classList.remove('active');
                toggleBtn.innerHTML = '<i class="fas fa-magic"></i> Change Vibe';
                toggleBtn.style.background = "transparent";
                toggleBtn.style.color = "#fff";
            }
        });

        // --- 3. CURSOR LOGIC ---
        // Only on non-touch devices
        if (window.matchMedia("(hover: hover)").matches) {
            const cursorBig = document.getElementById('cursor-big');
            const cursorSmall = document.getElementById('cursor-small');
            let mouseX = 0, mouseY = 0, cursorX = 0, cursorY = 0;

            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                gsap.to(cursorSmall, { x: mouseX, y: mouseY, duration: 0 });
            });

            function animateCursor() {
                cursorX += (mouseX - cursorX) * 0.1;
                cursorY += (mouseY - cursorY) * 0.1;
                cursorBig.style.transform = `translate(${cursorX - 20}px, ${cursorY - 20}px)`;
                requestAnimationFrame(animateCursor);
            }
            animateCursor();

            const btns = document.querySelectorAll('a, button, .member-card');
            btns.forEach(btn => {
                btn.addEventListener('mouseenter', () => {
                    gsap.to(cursorBig, { scale: 1.5, borderColor: '#fff', backgroundColor: 'rgba(255,255,255,0.1)' });
                });
                btn.addEventListener('mouseleave', () => {
                    gsap.to(cursorBig, { scale: 1, borderColor: 'rgba(255,255,255,0.3)', backgroundColor: 'transparent' });
                });
            });
        }

    </script>
</body>
</html>
